<!-- Interactive Calendar Component -->
<div class="calendar-component">
  <div class="calendar-header">
    <button id="prev-month" class="btn btn-secondary">&lt;</button>
    <h3 id="current-month-year"></h3>
    <button id="next-month" class="btn btn-secondary">&gt;</button>
  </div>

  <div class="calendar-grid">
    <div class="day-name">Sun</div>
    <div class="day-name">Mon</div>
    <div class="day-name">Tue</div>
    <div class="day-name">Wed</div>
    <div class="day-name">Thu</div>
    <div class="day-name">Fri</div>
    <div class="day-name">Sat</div>
  </div>

  <div id="calendar-days" class="calendar-grid days-grid"></div>
</div>

<!-- Modal for Event Details -->
<div id="event-modal" class="modal" hidden>
  <div class="modal-content">
    <span class="close-modal">&times;</span>
    <h4 id="modal-title"></h4>
    <p id="modal-date" class="text-muted"></p>
    <p id="modal-description"></p>
    <div id="modal-actions"></div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const monthYearLabel = document.getElementById("current-month-year");
    const daysContainer = document.getElementById("calendar-days");
    const prevBtn = document.getElementById("prev-month");
    const nextBtn = document.getElementById("next-month");

    let currentDate = new Date();

    // Sample events array - replace or extend as needed
    const events = [
      { date: "2026-06-02", title: "Actuarial 101 Panel", description: "Industry panel discussing pathways and exams." }
    ];

    function renderCalendar() {
      daysContainer.innerHTML = "";
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();

      monthYearLabel.textContent = new Date(year, month).toLocaleDateString("en-US", {
        month: "long",
        year: "numeric"
      });

      const firstDayIndex = new Date(year, month, 1).getDay();
      const lastDay = new Date(year, month + 1, 0).getDate();

      // Empty slots for previous month padding
      for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.classList.add("day-cell", "empty");
        daysContainer.appendChild(emptyCell);
      }

      // Fill in actual days
      for (let day = 1; day <= lastDay; day++) {
        const cell = document.createElement("div");
        cell.classList.add("day-cell");

        const formattedDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        cell.innerHTML = `<span class="day-number">${day}</span>`;

        // Check for matching events
        const dayEvents = events.filter(e => e.date === formattedDate);
        dayEvents.forEach(evt => {
          const badge = document.createElement("div");
          badge.classList.add("event-badge");
          badge.textContent = evt.title;
          badge.onclick = (e) => {
            e.stopPropagation();
            openModal(evt);
          };
          cell.appendChild(badge);
        });

        daysContainer.appendChild(cell);
      }
    }

    prevBtn.addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    });

    nextBtn.addEventListener("click", () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    });

    // Modal logic
    const modal = document.getElementById("event-modal");
    const closeModal = document.querySelector(".close-modal");

    function openModal(evt) {
      document.getElementById("modal-title").textContent = evt.title;
      document.getElementById("modal-date").textContent = evt.date;
      document.getElementById("modal-description").textContent = evt.description;
      modal.hidden = false;
    }

    closeModal.onclick = () => { modal.hidden = true; };
    window.onclick = (e) => { if (e.target === modal) modal.hidden = true; };

    renderCalendar();
  });
</script>
